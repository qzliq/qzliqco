name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: brew install dpkg
      - name: Build
        run: |
          git clone --recursive https://github.com/theos/theos
          export THEOS=$GITHUB_WORKSPACE/theos
          make package
